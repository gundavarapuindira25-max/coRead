services:
  # ── Backend (FastAPI) ────────────────────────────────────────────
  # Frontend is deployed separately on Netlify (free)
  - type: web
    name: coread-api
    runtime: python
    region: oregon
    plan: hobby
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: GOOGLE_BOOKS_API_KEY
        sync: false
      - key: ENVIRONMENT
        value: production
